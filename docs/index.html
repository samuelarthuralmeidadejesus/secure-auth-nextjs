<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Auth Next.js</title>
  <meta http-equiv="refresh" content="2; url=https://secure-auth-nextjs.vercel.app" />
  <link rel="canonical" href="https://secure-auth-nextjs.vercel.app" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #f1f5f9;
    }

    .card {
      text-align: center;
      padding: 48px 40px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 420px;
    }

    .icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #3b82f6;
      border-radius: 50%;
      margin: 0 auto 24px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    a.button {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    a.button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <div class="spinner"></div>
    <h1>Redirecionando...</h1>
    <p>Você será levado ao Secure Auth Next.js em instantes.</p>
    <a class="button" href="https://secure-auth-nextjs.vercel.app">Ir agora</a>
  </div>

  <script>
    window.location.replace("https://secure-auth-nextjs.vercel.app");
  </script>
</body>
</html>
